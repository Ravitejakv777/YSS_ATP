<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline – YSS Anantapur</title>
  <link rel="stylesheet" href="/static/css/style.css?v=1.0.3">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body {
      background-color: var(--cream);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 1.5rem;
      font-family: 'Outfit', sans-serif;
      text-align: center;
    }
    .offline-card {
      background: #fff;
      border: 1px solid var(--light);
      border-radius: 16px;
      padding: 3rem 2rem;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow);
    }
    .logo-container {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      border: 2px solid var(--gold);
      overflow: hidden;
    }
    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    h1 {
      font-family: 'Cinzel', serif;
      color: var(--primary);
      margin-bottom: 1rem;
      font-size: 1.8rem;
    }
    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-content: center;
      background: var(--cream);
      padding: 0.75rem 1rem;
      border-radius: 10px;
      margin-bottom: 0.75rem;
      font-weight: 600;
      color: var(--primary-dark);
      text-decoration: none;
    }
    .contact-item i {
      color: var(--accent);
    }
    .btn {
      display: inline-block;
      width: 100%;
      box-sizing: border-box;
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="logo-container">
      <img src="/static/images/logo.png" alt="YSS Logo">
    </div>
    <h1>You are Offline</h1>
    <p>It looks like you are not connected to the internet right now. Please check your network connection and try again.</p>
    
    <div style="font-weight: 700; margin-bottom: 1rem; color: var(--text);">Need Immediate Assistance?</div>
    <a href="tel:+919441665181" class="contact-item">
      <i class="fa fa-phone"></i> +91 9441665181 (A Narsimhulu)
    </a>
    <a href="tel:+918019682209" class="contact-item">
      <i class="fa fa-phone"></i> +91 8019682209 (K Suresh)
    </a>

    <button onclick="retryConnection()" class="btn btn-primary">
      <i class="fa fa-sync" id="retry-icon"></i> <span id="retry-text">Retry Connection</span>
    </button>
  </div>

  <script>
    function retryConnection() {
      const btn = document.querySelector('button');
      const icon = document.getElementById('retry-icon');
      const text = document.getElementById('retry-text');

      btn.disabled = true;
      icon.className = 'fa fa-sync fa-spin';
      text.textContent = 'Checking connection...';

      // Try direct server fetch first (bypass service worker to detect actual server status)
      fetch('/?cb=' + Date.now() + '&bypass-sw=true', { cache: 'no-store' })
        .then(resp => {
          if (resp.ok) {
            // Server reachable, reload page
            window.location.reload();
          } else {
            // Server responded but error, try proxy fallback
            return tryProxy();
          }
        })
        .catch(() => {
          // Direct fetch failed, try proxy fallback
          return tryProxy();
        });

      function tryProxy() {
        // Redirect the user's browser directly to the new unblocked custom domain
        const targetUrl = 'https://yssatp2026.in' + window.location.pathname + window.location.search;
        window.location.replace(targetUrl);
      }
    }

    function showDnsWarningBanner() {
      let warnBox = document.getElementById('dnsWarningBox');
      if (!warnBox) {
        warnBox = document.createElement('div');
        warnBox.id = 'dnsWarningBox';
        warnBox.style.background = '#fff3cd';
        warnBox.style.border = '1px solid #ffeeba';
        warnBox.style.color = '#856404';
        warnBox.style.padding = '1.25rem';
        warnBox.style.borderRadius = '10px';
        warnBox.style.marginTop = '1.5rem';
        warnBox.style.textAlign = 'left';
        warnBox.style.fontSize = '0.9rem';
        warnBox.style.lineHeight = '1.5';
        warnBox.innerHTML = `
          <strong style="display:block;margin-bottom:0.5rem;color:#b5330a;"><i class="fa fa-exclamation-triangle"></i> DNS / ISP Access Block Detected</strong>
          Your device has internet access, but your internet provider (ISP) cannot resolve this server's domain.
          <div style="margin-top:0.5rem;">To access the site:</div>
          <ul style="margin:0.25rem 0 0;padding-left:1.25rem;list-style-type:circle;">
            <li>Change your phone's Private DNS setting to <strong>dns.google</strong> or <strong>1dot1dot1dot1.cloudflare-dns.com</strong></li>
            <li>Or turn on a <strong>VPN</strong> (if available)</li>
            <li>Or temporarily switch from mobile network to Wi-Fi (or vice versa)</li>
          </ul>
        `;
        const card = document.querySelector('.offline-card');
        card.appendChild(warnBox);
      }
    }

    function showToast(msg, type, duration = 3500) {
      let c = document.getElementById('toastContainer');
      if (!c) {
        c = document.createElement('div');
        c.id = 'toastContainer';
        c.className = 'toast-container';
        document.body.appendChild(c);
      }
      const t = document.createElement('div');
      t.className = 'toast toast-' + type;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => {
        t.style.opacity = '0';
        t.style.transform = 'translateX(100%)';
        t.style.transition = 'all 0.4s';
        setTimeout(() => t.remove(), 400);
      }, duration);
    }
    window.addEventListener('load', () => {
      if (navigator.onLine) {
        // Automatically check connection and trigger proxy if online but landed on offline page
        setTimeout(retryConnection, 1000);
      }
    });
  </script>
</body>
</html>
