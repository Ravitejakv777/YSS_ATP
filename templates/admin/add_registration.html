{% extends 'admin/base_admin.html' %}
{% block title %}Add Participant – YSS Admin{% endblock %}
{% block content %}
<div class="admin-header">
  <h1><i class="fa fa-user-plus" style="color:var(--gold);margin-right:.5rem;"></i>Add Participant</h1>
  <a href="{{ url_for('admin_registrations') }}" class="btn btn-outline btn-sm"><i class="fa fa-arrow-left"></i> Back to Registrations</a>
</div>

<div class="table-card" style="max-width:900px; margin: 0 auto; padding: 2rem;">
  <form method="POST" action="{{ url_for('admin_add_registration') }}" enctype="multipart/form-data">
    <div class="form-grid form-grid-2">
      <div class="form-group" style="margin-bottom:1rem;">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">Lesson No <span style="color:red;">*</span></label>
        <input type="text" name="lesson_no" class="filter-select" style="width:100%;padding:.75rem;border:1px solid #ccc;border-radius:4px;" placeholder="Enter lesson number" value="{{ form.get('lesson_no','') }}" required>
      </div>
      <div class="form-group" style="margin-bottom:1rem;">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">Full Name <span style="color:red;">*</span></label>
        <input type="text" name="full_name" class="filter-select" style="width:100%;padding:.75rem;border:1px solid #ccc;border-radius:4px;" placeholder="Enter full name" value="{{ form.get('full_name','') }}" required>
      </div>
    </div>
    
    <div class="form-grid form-grid-3" style="margin-top:1rem; display:grid; grid-template-columns:1fr 1fr 1fr; gap:1.5rem;">
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">Gender <span style="color:red;">*</span></label>
        <select name="gender" class="filter-select" style="width:100%;padding:.75rem;border:1px solid #ccc;border-radius:4px;" required>
          <option value="">-- Select Gender --</option>
          <option value="Male" {% if form.get('gender')=='Male' %}selected{% endif %}>Male</option>
          <option value="Female" {% if form.get('gender')=='Female' %}selected{% endif %}>Female</option>
          <option value="Other" {% if form.get('gender')=='Other' %}selected{% endif %}>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">Age <span style="color:red;">*</span></label>
        <input type="number" name="age" class="filter-select" style="width:100%;padding:.75rem;border:1px solid #ccc;border-radius:4px;" placeholder="Enter age" value="{{ form.get('age','') }}" min="5" max="120" required>
      </div>
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">City/Village/Town <span style="color:red;">*</span></label>
        <input type="text" name="place" class="filter-select" style="width:100%;padding:.75rem;border:1px solid #ccc;border-radius:4px;" placeholder="Enter place" value="{{ form.get('place','') }}" required>
      </div>
    </div>
    
    <div class="form-grid form-grid-3" style="margin-top:1rem; display:grid; grid-template-columns:1fr 1fr 1fr; gap:1.5rem;">
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">District <span style="color:#888;font-weight:normal;">(Optional)</span></label>
        <input type="text" name="district" class="filter-select" style="width:100%;padding:.75rem;border:1px solid #ccc;border-radius:4px;" placeholder="Enter district" value="{{ form.get('district','') }}">
      </div>
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">State <span style="color:red;">*</span></label>
        <input type="text" name="state" class="filter-select" style="width:100%;padding:.75rem;border:1px solid #ccc;border-radius:4px;" placeholder="Enter state" value="{{ form.get('state','') }}" required>
      </div>
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">Email Address <span style="color:#888;font-weight:normal;">(Optional)</span></label>
        <input type="email" name="email" class="filter-select" style="width:100%;padding:.75rem;border:1px solid #ccc;border-radius:4px;" placeholder="Enter email (optional)" value="{{ form.get('email','') }}">
      </div>
    </div>
    
    <div class="form-grid form-grid-2" style="margin-top:1rem; display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">Kriya <span style="color:red;">*</span></label>
        <div style="display:flex;gap:1rem;">
          <label><input type="radio" name="is_kriyaban" value="yes" {% if form.get('is_kriyaban')=='yes' %}checked{% endif %}> Kriyaban</label>
          <label><input type="radio" name="is_kriyaban" value="no" {% if form.get('is_kriyaban')!='yes' %}checked{% endif %}> Non-Kriyaban</label>
        </div>
      </div>
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">WhatsApp No <span style="color:red;">*</span></label>
        <div style="display:flex;gap:0.5rem;">
          <select name="country_code" class="filter-select" style="padding:.75rem;border:1px solid #ccc;border-radius:4px;">
            <option value="+91" selected>+91 (IND)</option>
            <option value="+1">+1 (USA/CAN)</option>
            <option value="+44">+44 (UK)</option>
          </select>
          <input type="tel" name="whatsapp" class="filter-select" style="flex:1;padding:.75rem;border:1px solid #ccc;border-radius:4px;" placeholder="10 digit number" value="{{ form.get('whatsapp','') }}" maxlength="10" required>
        </div>
      </div>
    </div>
    
    <div class="form-grid form-grid-2" style="margin-top:1rem; display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">Accommodation Required <span style="color:red;">*</span></label>
        <div style="display:flex;gap:1rem;">
          <label><input type="radio" name="accommodation" value="yes" {% if form.get('accommodation')=='yes' %}checked{% endif %}> Yes</label>
          <label><input type="radio" name="accommodation" value="no" {% if form.get('accommodation')!='yes' %}checked{% endif %}> No</label>
        </div>
      </div>
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">Volunteer <span style="color:red;">*</span></label>
        <div style="display:flex;gap:1rem;">
          <label><input type="radio" name="volunteer" value="yes" {% if form.get('volunteer')=='yes' %}checked{% endif %}> Yes</label>
          <label><input type="radio" name="volunteer" value="no" {% if form.get('volunteer')!='yes' %}checked{% endif %}> No</label>
        </div>
      </div>
    </div>
    
    <div class="form-grid form-grid-3" style="margin-top:1rem; display:grid; grid-template-columns:1fr 1fr 1fr; gap:1.5rem;">
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">Date of Arrival <span style="color:red;">*</span></label>
        <input type="date" name="arrival_date" class="filter-select" style="width:100%;padding:.75rem;border:1px solid #ccc;border-radius:4px;" value="{{ form.get('arrival_date','2026-07-24') }}" required>
      </div>
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">Date of Departure <span style="color:red;">*</span></label>
        <input type="date" name="departure_date" class="filter-select" style="width:100%;padding:.75rem;border:1px solid #ccc;border-radius:4px;" value="{{ form.get('departure_date','2026-07-26') }}" required>
      </div>
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">Payment Mode <span style="color:red;">*</span></label>
        <select name="payment_mode" class="filter-select" style="width:100%;padding:.75rem;border:1px solid #ccc;border-radius:4px;" required>
          <option value="Cash" {% if form.get('payment_mode')=='Cash' %}selected{% endif %}>Cash</option>
          <option value="UPI" {% if form.get('payment_mode')=='UPI' %}selected{% endif %}>UPI</option>
        </select>
      </div>
    </div>

    <div class="form-grid form-grid-2" style="margin-top:1rem; display:grid; grid-template-columns:1fr 1fr; gap:1.5rem;">
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">Transaction ID <span style="color:#888;font-weight:normal;">(Optional)</span></label>
        <input type="text" name="transaction_id" class="filter-select" style="width:100%;padding:.75rem;border:1px solid #ccc;border-radius:4px;" placeholder="Enter Transaction ID" value="{{ form.get('transaction_id','') }}">
      </div>
      <div class="form-group">
        <label style="display:block;margin-bottom:.5rem;font-weight:600;">Upload Payment Screenshot <span style="color:#888;font-weight:normal;">(Optional)</span></label>
        <input type="file" name="payment_screenshot" class="filter-select" style="width:100%;padding:.5rem;border:1px solid #ccc;border-radius:4px;" accept="image/*">
      </div>
    </div>

    <div style="margin-top:2.5rem;">
      <button type="submit" class="btn btn-gold" style="width:100%; padding:1rem; font-size:1.1rem;"><i class="fa fa-save"></i> Save Participant</button>
    </div>
  </form>
</div>
{% endblock %}
