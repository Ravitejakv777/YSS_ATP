{% extends 'base.html' %}
{% block title %}Donation – YSS Anantapur{% endblock %}
{% block content %}
<section class="section">
  <div class="container">
    <div class="form-card">
      <h2 class="form-title">Donation Form</h2>
      <div class="divider-ornament">✦</div>
      <p class="form-subtitle">Please fill in the details below to make a donation.</p>
      <form method="POST" action="{{ url_for('donation') }}" enctype="multipart/form-data">
        <div class="form-grid form-grid-2">
          <div class="form-group">
            <label>Lesson No <span class="req">*</span></label>
            <input type="text" name="lesson_no" class="form-control" placeholder="Enter lesson number e.g. 12345" value="{{ form.get('lesson_no','') }}" required>
          </div>
          <div class="form-group">
            <label>Name <span class="req">*</span></label>
            <input type="text" name="name" class="form-control" placeholder="Enter your full name" value="{{ form.get('name','') }}" required>
          </div>
        </div>
        <div class="form-grid form-grid-2" style="margin-top:1.25rem;">
          <div class="form-group">
            <label>Age <span class="req">*</span></label>
            <input type="number" name="age" class="form-control" placeholder="Enter your age" value="{{ form.get('age','') }}" required>
          </div>
          <div class="form-group">
            <label>Place <span class="req">*</span></label>
            <input type="text" name="place" class="form-control" placeholder="Enter your place" value="{{ form.get('place','') }}" required>
          </div>
        </div>
        <div class="form-group" style="margin-top:1.25rem;">
          <label>WhatsApp Number <span class="req">*</span></label>
          <input type="tel" name="whatsapp" class="form-control" placeholder="Enter 10 digit WhatsApp number" value="{{ form.get('whatsapp','') }}" maxlength="10" pattern="[0-9]{10}" title="Please enter exactly 10 digits" required>
        </div>
        <div class="form-grid form-grid-2" style="margin-top:1.25rem;">
          <div class="form-group">
            <label>Amount (₹) <span class="req">*</span></label>
            <input type="number" name="amount" class="form-control" placeholder="Enter amount" value="{{ form.get('amount','') }}" min="1" required>
          </div>
          <div class="form-group">
            <label>Payment Mode <span class="req">*</span></label>
            <select name="payment_mode" class="form-control" required>
              <option value="">-- Select Payment Mode --</option>
              <option value="UPI" {% if form.get('payment_mode')=='UPI' %}selected{% endif %}>UPI</option>
              <option value="Cash" {% if form.get('payment_mode')=='Cash' %}selected{% endif %}>Cash</option>
            </select>
          </div>
        </div>
        <div class="form-grid form-grid-2" style="margin-top:1.25rem;">
          <div class="form-group">
            <label>Transaction ID <span class="req">*</span></label>
            <input type="text" name="transaction_id" class="form-control" placeholder="Enter Transaction ID" value="{{ form.get('transaction_id','') }}" required>
          </div>
          <div class="form-group">
            <label>Upload Payment Screenshot <span class="req">*</span></label>
            <input type="file" name="payment_screenshot" class="form-control" accept="image/*" required>
          </div>
        </div>
        <div class="form-note mt-3"><i class="fa fa-info-circle" style="color:var(--accent);"></i> All fields marked with <strong>*</strong> are mandatory.</div>
        <div id="payment-details" style="background:var(--cream);padding:1.5rem;border-radius:8px;margin-top:2rem;text-align:center;">
          <h3 style="color:var(--primary);margin-bottom:1rem;font-family:'Cinzel',serif;">Payment Details</h3>
          <div style="margin-top:1.5rem;">
            <p style="margin-bottom:0.5rem;font-weight:bold;">Scan QR to Pay</p>
            <img src="{{ url_for('static', filename='images/image.png') }}" alt="QR Code" style="width:200px;border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,0.1);">
            <p style="margin-top:0.5rem;font-size:1.1rem;color:var(--primary);font-weight:bold;">PhonePe Mobile Number: 9390541258</p>
          </div>
        </div>
        <div style="margin-top:2rem;text-align:center;">
          <button type="submit" class="btn btn-primary" style="padding:.9rem 3rem;font-size:1rem;">Submit Donation</button>
        </div>
      </form>
    </div>
  </div>
</section>
{% endblock %}
